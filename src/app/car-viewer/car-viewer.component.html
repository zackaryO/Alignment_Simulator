<div class="container">
  <div class="status-box" *ngIf="statusMessage" [innerHTML]="statusMessage"></div>
  <div #rendererContainer class="renderer-container"></div>
  <div class="controls">
    <!-- Left Wheel -->
    <div class="control-column">
      <h3 class="column-header">Left Wheel</h3>
      <div class="control-item">
        <label for="leftCamber">Camber: {{ formatDegrees(leftCamber) }}</label>
        <input type="range" id="leftCamber" min="-5" max="5" step="0.1"
               [disabled]="!modelLoaded" [(ngModel)]="leftCamber" (input)="onAngleChange()">
      </div>
      <div class="control-item">
        <label for="leftToe">Toe: {{ formatDegrees(leftToe) }}</label>
        <input type="range" id="leftToe" min="-3" max="3" step="0.1"
               [disabled]="!modelLoaded" [(ngModel)]="leftToe" (input)="onAngleChange()">
      </div>
    </div>

    <!-- Shared Controls -->
    <div class="control-column">
      <h3 class="column-header">Shared</h3>
      <div class="control-item">
        <label for="turn">Turn: {{ formatDegrees(turnAngle) }}</label>
        <input type="range" id="turn" min="-40" max="40" step="0.5"
               [disabled]="!modelLoaded" [(ngModel)]="turnAngle" (input)="onAngleChange()">
      </div>
      <div class="control-item">
        <label for="caster">Caster: {{ formatDegrees(casterAngle) }}</label>
        <input type="range" id="caster" min="0" max="10" step="0.5"
               [disabled]="!modelLoaded" [(ngModel)]="casterAngle" (input)="onAngleChange()">
      </div>
      <div class="control-item">
        <label for="sai">SAI/KPI: {{ formatDegrees(saiAngle) }}</label>
        <input type="range" id="sai" min="0" max="20" step="0.5"
               [disabled]="!modelLoaded" [(ngModel)]="saiAngle" (input)="onAngleChange()">
      </div>
      <div class="button-group">
        <button (click)="resetAngles()">Reset All</button>
      </div>
    </div>

    <!-- Right Wheel -->
    <div class="control-column">
      <h3 class="column-header">Right Wheel</h3>
      <div class="control-item">
        <label for="rightCamber">Camber: {{ formatDegrees(rightCamber) }}</label>
        <input type="range" id="rightCamber" min="-5" max="5" step="0.1"
               [disabled]="!modelLoaded" [(ngModel)]="rightCamber" (input)="onAngleChange()">
      </div>
      <div class="control-item">
        <label for="rightToe">Toe: {{ formatDegrees(rightToe) }}</label>
        <input type="range" id="rightToe" min="-3" max="3" step="0.1"
               [disabled]="!modelLoaded" [(ngModel)]="rightToe" (input)="onAngleChange()">
      </div>
    </div>
  </div>

  <!-- Computed Values -->
  <div class="computed-values">
    <span><b>Cross Camber:</b> {{ formatDegrees(crossCamber) }}</span>
    <span><b>Total Toe:</b> {{ formatDegrees(totalToe) }}</span>
  </div>

  <div class="credits">
    <small><b>Created By:</b> Zack Otterstrom.</small>
    <br>
    <small><b>Using:</b> 3-D model created by KrStolorz (Krzysztof Stolorz) (https://sketchfab.com/KrStolorz)</small>
  </div>
</div>
